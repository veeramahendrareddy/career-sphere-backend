<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            background: #0b0f19;
            color: white;
            font-family: Arial;
        }

        .box {
            width: 400px;
            margin: 100px auto;
            padding: 20px;
            background: #1a1f2e;
            border-radius: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #2a2f3e;
            border: none;
            color: white;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            background: red;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Login</h2>

    <form action="/login" method="post">

        Email:
        <input type="email" name="email">

        Password:
        <input type="password" name="password">

        <button type="submit">Login</button>
    </form>

    <p>New user? <a href="/register">Register</a></p>
</div>

</body>
</html>
